name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      simulated_tag:
        description: "Simulate a release tag (e.g., v0.0.3-alpha)"
        required: true
        default: "v0.0.3-alpha"

env:
  FLOWWING_VERSION: ${{ github.event.release.tag_name }}

jobs:
  # ============================================================================
  # BUILD INSTALLERS & ARCHIVES (matrix)
  # ============================================================================
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            arch: arm64
            installer_ext: .dmg
            archive_name: FlowWing-${{ github.event.release.tag_name }}-macos-arm64.zip
            installer_name: FlowWing-${{ github.event.release.tag_name }}-macos-arm64.dmg
            install_prefix: /usr/local/flow-wing/${{ github.event.release.tag_name }}/
          - name: windows-x86_64
            os: windows-latest
            arch: x86_64
            installer_ext: .exe
            archive_name: FlowWing-${{ github.event.release.tag_name }}-windows-x86_64.zip
            installer_name: FlowWing-${{ github.event.release.tag_name }}-windows-x86_64.exe
            install_prefix: "C:\\Program Files\\FlowWing\\${{ github.event.release.tag_name }}\\"
          - name: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
            installer_ext: .deb
            archive_name: FlowWing-${{ github.event.release.tag_name }}-linux-x86_64.zip
            installer_name: FlowWing-${{ github.event.release.tag_name }}-linux-x86_64.deb
            install_prefix: /usr/local/flow-wing/${{ github.event.release.tag_name }}/

    steps:
      - name: Enable Windows longpaths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up environment
        shell: bash
        run: |
          # Real tag if it's a release, otherwise use the manual input
          TAG_NAME="${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}"
          echo "FLOWWING_VERSION=$TAG_NAME" >> $GITHUB_ENV

          if [ "${{ runner.os }}" == "Windows" ]; then
            echo "INSTALL_PREFIX=C:\\Program Files\\FlowWing\\$TAG_NAME\\" >> $GITHUB_ENV
          else
            echo "INSTALL_PREFIX=/usr/local/flow-wing/$TAG_NAME/" >> $GITHUB_ENV
          fi

      # --- macOS dependencies ---
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install --quiet ninja ccache automake autoconf libtool llvm@17 create-dmg
          echo "CC=$(brew --prefix llvm@17)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm@17)/bin/clang++" >> $GITHUB_ENV
          echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

      - name: Select Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: SDKROOT (macOS)
        if: runner.os == 'macOS'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

      # --- Windows dependencies ---
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install --quiet make nsis
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      # --- Linux dependencies ---
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 lld ninja-build ccache automake autoconf libtool wget
          sudo apt-get install -y libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev
          echo "CC=clang-17" >> $GITHUB_ENV
          echo "CXX=clang++-17" >> $GITHUB_ENV
          echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

      # --- Build Project Dependencies ---
      # --- Restore/Build Project Dependencies ---
      - name: Restore Dependencies Cache
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            .fw_dependencies/install
            .fw_dependencies/stamps
          # This key must perfectly match the one used in multi_platform_ci.yml
          key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('cmake/deps_builder/CMakeLists.txt') }}

      - name: Build Project Dependencies
        # Only run the heavy make command if the cache wasn't found
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: make deps-install-release

      - name: Prune dependency build tree (reduce cache size)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: rm -rf .fw_dependencies/build

      # --- Build compiler with install prefix (make uses -j for Ninja; see makefile JOBS) ---
      # macOS: same as multi_platform_ci — Homebrew LLVM + Xcode 15.4 + SDKROOT.
      - name: Configure CMake (Release)
        run: make release-aot-configure RELEASE_INSTALL_PREFIX="${{ matrix.install_prefix }}"

      - name: Build compiler
        run: make release-aot-build RELEASE_INSTALL_PREFIX="${{ matrix.install_prefix }}"

      # --- Stage SDK ---
      - name: Stage SDK
        run: make release-aot-install RELEASE_INSTALL_PREFIX="${{ matrix.install_prefix }}"

      # --- Create archive ---
      - name: Create archive
        run: |
          cd ${{ matrix.install_prefix }}
          zip -r ../${{ matrix.archive_name }} .

      # --- Create native installer ---
      - name: Create native installer
        run: |
          chmod +x .github/workflows/scripts/build-installer.sh
          .github/workflows/scripts/build-installer.sh \
            ${{ matrix.install_prefix }} \
            ${{ matrix.install_prefix }} \
            ${{ matrix.installer_name }} \
            ${{ runner.os }} \
            ${{ matrix.arch }}

      # --- Upload installer artifact ---
      - name: Upload installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ matrix.installer_name }}
          asset_name: ${{ matrix.installer_name }}
          asset_content_type: application/octet-stream

      # --- Upload archive artifact ---
      - name: Upload archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ../${{ matrix.archive_name }}
          asset_name: ${{ matrix.archive_name }}
          asset_content_type: application/zip

  # ============================================================================
  # UPLOAD ARTIFACTS (waits for all builds)
  # ============================================================================
  upload:
    name: Upload all artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify all artifacts uploaded
        run: |
          echo "All build artifacts uploaded successfully."
          echo "Release: ${{ github.event.release.tag_name }}"

  # ============================================================================
  # PACKAGE MANAGER PUBLISHING (parallel, non-blocking)
  # ============================================================================
  publish-homebrew:
    name: Publish to Homebrew
    needs: upload
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Publish to Homebrew
        run: |
          chmod +x .github/workflows/scripts/package-homebrew.sh
          .github/workflows/scripts/package-homebrew.sh \
            "${{ github.event.release.tag_name }}" \
            "${{ github.event.release.html_url }}" \
            "${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            "${{ secrets.HOMEBREW_TAP_USERNAME }}" \
            "${{ secrets.HOMEBREW_TAP_EMAIL }}"

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: upload
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Publish to Chocolatey
        run: |
          chmod +x .github/workflows/scripts/package-chocolatey.sh
          .github/workflows/scripts/package-chocolatey.sh \
            "${{ github.event.release.tag_name }}" \
            "${{ github.event.release.html_url }}" \
            "${{ secrets.CHOCOLATEY_API_KEY }}"

  publish-apt:
    name: Publish to apt
    needs: upload
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Publish to apt
        run: |
          chmod +x .github/workflows/scripts/package-apt.sh
          .github/workflows/scripts/package-apt.sh \
            "${{ github.event.release.tag_name }}" \
            "${{ secrets.APT_REPO_TOKEN }}" \
            "${{ secrets.APT_REPO_USERNAME }}"
