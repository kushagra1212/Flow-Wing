name: Release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            simulated_tag:
                description: "Simulate a release tag (e.g., v0.0.3-alpha)"
                required: true
                default: "v0.0.3-alpha"

# Default GITHUB_TOKEN is read-only in many repos; uploading release assets requires write access.
permissions:
    contents: write

env:
    # Resolved once at the workflow level so every job/step can use env.FLOWWING_VERSION
    # directly without re-expanding the long ternary expression.
    # Evaluated at dispatch (release.tag_name on release events, simulated_tag on workflow_dispatch).
    FLOWWING_VERSION: ${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}

jobs:
    # ============================================================================
    # BUILD INSTALLERS & ARCHIVES (matrix)
    # ============================================================================
    build:
        name: Build ${{ matrix.name }} installer
        runs-on: ${{ matrix.os }}
        # `github.workspace` is valid here (unlike in matrix.include). Required so `${{ env.INSTALL_PREFIX }}`
        # works in `working-directory` and other expressions; GITHUB_ENV alone is not applied early enough for that.
        env:
            INSTALL_PREFIX: ${{ github.workspace }}/release-stage/${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}/
        strategy:
            # Let macOS / Windows / Linux all run to completion so one failure does not cancel the others.
            fail-fast: false
            matrix:
                include:
                    # Install under the workspace so CI does not need sudo (/usr/local/... is not writable).
                    # Do not put install paths in the matrix: `github.workspace` is empty there, which produced `/release-stage/...` (root FS).
                    # `INSTALL_PREFIX` is set on the job env (above).
                    - name: macos-arm64
                      os: macos-14
                      arch: arm64
                      installer_ext: .dmg
                      archive_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-macos-arm64.zip
                      installer_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-macos-arm64.dmg
                      # .pkg runs a postinstall script (as root) that wires up /usr/local/bin/ symlinks,
                      # so a double-click install puts `flowwing` / `flowwing-jit` straight onto Terminal.app's
                      # default PATH. The .dmg is still shipped for users who prefer drag-and-drop.
                      pkg_installer_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-macos-arm64.pkg
                    - name: windows-x86_64
                      os: windows-latest
                      arch: x86_64
                      installer_ext: .exe
                      archive_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-windows-x86_64.zip
                      installer_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-windows-x86_64.exe
                    - name: linux-x86_64
                      os: ubuntu-latest
                      arch: x86_64
                      installer_ext: .deb
                      archive_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-linux-x86_64.zip
                      installer_name: FlowWing-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}-linux-x86_64.deb

        steps:
            # Order and toolchain mirror .github/workflows/multi_platform_ci.yml per OS.
            - name: Enable Windows longpaths
              if: runner.os == 'Windows'
              run: git config --system core.longpaths true

            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}
                  # ref is always a tag here; shallow fetch + fetch-tags:false often breaks tag resolution (Windows/macOS/Linux).
                  fetch-tags: true
                  fetch-depth: 0

            # Re-export FLOWWING_VERSION into GITHUB_ENV for steps that shell-expand it
            # (e.g. NSIS `$FLOWWING_VERSION`, fpm --version, DMG launcher). The top-level
            # `env:` is visible to expressions but not to inherited child shells of heredocs.
            - name: Set up environment
              shell: bash
              run: |
                  echo "FLOWWING_VERSION=${FLOWWING_VERSION}" >> "$GITHUB_ENV"

            # --- macOS (same sequence as multi_platform_ci macos_arm64_test + create-dmg for installers) ---
            - name: Select Xcode Version
              if: runner.os == 'macOS'
              run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

            - name: Install Tools (macOS)
              if: runner.os == 'macOS'
              run: brew install ninja ccache automake autoconf libtool llvm@17 create-dmg librsvg

            - name: Set Compiler Environment (macOS)
              if: runner.os == 'macOS'
              run: |
                  echo "CC=$(brew --prefix llvm@17)/bin/clang" >> $GITHUB_ENV
                  echo "CXX=$(brew --prefix llvm@17)/bin/clang++" >> $GITHUB_ENV
                  echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV
                  echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

            # --- Windows (same as multi_platform_ci windows_x86_64_test + nsis for release installers) ---
            - name: Install Build Tools
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install -y 7zip make nsis
                  # Git Bash steps do not inherit Chocolatey's NSIS PATH; add explicitly.
                  Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files (x86)\NSIS'

            - name: Set up MSVC Developer Command Prompt
              if: runner.os == 'Windows'
              uses: ilammy/msvc-dev-cmd@v1

            # --- Linux (same apt line as multi_platform_ci linux_x86_64_test) ---
            - name: Install Tools (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang-17 lld ninja-build ccache automake autoconf libtool wget libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev ruby ruby-dev build-essential
                  sudo gem install --no-document fpm

            - name: Set Compiler Environment (Linux)
              if: runner.os == 'Linux'
              run: |
                  echo "CC=clang-17" >> $GITHUB_ENV
                  echo "CXX=clang++-17" >> $GITHUB_ENV
                  echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

            # --- Staged SDK (release install tree): version + OS + arch specific ---
            - name: Restore staged SDK cache
              id: cache-staged-sdk
              uses: actions/cache/restore@v4
              with:
                  path: release-stage/${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}
                  key: ${{ runner.os }}-${{ runner.arch }}-staged-sdk-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}

            # --- Build Project Dependencies ---
            # --- Restore/Build Project Dependencies ---
            - name: Restore Dependencies Cache
              id: cache-deps
              uses: actions/cache@v4
              with:
                  path: |
                      .fw_dependencies/install
                      .fw_dependencies/stamps
                  # This key must perfectly match the one used in multi_platform_ci.yml
                  key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('cmake/deps_builder/CMakeLists.txt') }}

            - name: Build Project Dependencies
              # Skip when staged SDK is already cached (nothing to build) or deps cache hit
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
              run: make deps-install-release

            - name: Prune dependency build tree (reduce cache size)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
              shell: bash
              run: rm -rf .fw_dependencies/build

            # --- Build compiler with install prefix (make uses -j for Ninja; see makefile JOBS) ---
            # Toolchains match multi_platform_ci: macOS Homebrew LLVM + Xcode + SDKROOT;
            # Windows MSVC via msvc-dev-cmd + choco tools; Linux clang-17 + lld.
            - name: Configure CMake (Release AOT)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              run: make release-aot-configure RELEASE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"

            - name: Build compiler (AOT)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              run: make release-aot-build RELEASE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"

            # --- Stage SDK (AOT FlowWing + lib/modules + lib/<platform>) ---
            - name: Stage SDK (AOT)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              shell: bash
              run: |
                  # Explicitly create the path before installing to prevent Windows cmd.exe errors
                  mkdir -p "${{ env.INSTALL_PREFIX }}"
                  make release-aot-install RELEASE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"

            # --- Build & install JIT (FlowWing-jit) into the same SDK bin/ ---
            # Shares the already-staged lib/modules and lib/<platform> from the AOT install,
            # so only the JIT binary is added to the stage.
            - name: Build compiler (JIT)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              run: make release-jit-build RELEASE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"

            - name: Stage SDK (JIT — installs as FlowWing-jit)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              run: make release-jit-install RELEASE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"

            # Bundle the LLVM linker tool into the staged SDK bin/ so AOT linking works on
            # user machines without requiring a system toolchain:
            #
            #   * Linux / macOS  -> clang++ (GCC-style driver; our command builder emits -L, -l, -Wl,-w)
            #   * Windows        -> lld-link.exe (consumes MSVC-style /OUT:, /LIBPATH:, ucrt.lib, ...)
            #
            # NOTE: llvm-config is a *build-time* tool and is intentionally omitted — shipping it only
            # bloats the installer. See src/common/io/PathUtils.hpp :: getAOTLinkerPath() for the
            # runtime resolution logic and src/compiler/Linker/LinkerCommandBuilder.cpp for usage.
            - name: Bundle LLVM linker tools (Unix)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true' && runner.os != 'Windows'
              shell: bash
              run: |
                  set -e
                  DEPS_ROOT="${{ github.workspace }}/.fw_dependencies/install"
                  DEPS_BIN="${DEPS_ROOT}/bin"
                  DEPS_LIB="${DEPS_ROOT}/lib"
                  STAGED_BIN="${{ env.INSTALL_PREFIX }}/bin"
                  STAGED_LIB="${{ env.INSTALL_PREFIX }}/lib"
                  mkdir -p "$STAGED_LIB"

                  if [ ! -f "$DEPS_BIN/clang++" ]; then
                    echo "ERROR: $DEPS_BIN/clang++ not found — cannot bundle Unix AOT linker."
                    exit 1
                  fi
                  cp "$DEPS_BIN/clang++" "$STAGED_BIN/"
                  echo "Bundled clang++ into SDK bin/"

                  if [ "${{ runner.os }}" = "Linux" ]; then
                    # clang++ looks specifically for 'ld.lld' when given -fuse-ld=lld
                    if [ -f "$DEPS_BIN/ld.lld" ]; then
                      # -L to copy the actual binary, not the symlink!
                      cp -L "$DEPS_BIN/ld.lld" "$STAGED_BIN/"
                      echo "Bundled ld.lld into SDK bin/"
                    elif [ -f "$DEPS_BIN/lld" ]; then
                      cp -L "$DEPS_BIN/lld" "$STAGED_BIN/ld.lld"
                      echo "Bundled lld (as ld.lld) into SDK bin/"
                    else
                      echo "ERROR: ld.lld or lld not found in deps — zero-dependency Linux AOT will fail."
                      exit 1
                    fi
                  fi

                  # clang++ was built against shared libLLVM / libclang-cpp (see cmake/deps_builder/CMakeLists.txt
                  # -DLLVM_BUILD_LLVM_DYLIB=ON / -DLLVM_LINK_LLVM_DYLIB=ON for non-Windows). Its rpath is
                  # @loader_path/../lib (macOS) / $ORIGIN/../lib (Linux), so staging the dylibs under
                  # <SDK>/lib/ alongside the modules/ + <platform>/ dirs satisfies the loader without any
                  # install_name_tool rewriting. Without these, clang++ dies at process start on user machines:
                  #   "dyld: Library not loaded: @rpath/libclang-cpp.dylib"
                  if [ "${{ runner.os }}" = "macOS" ]; then
                    for lib in libclang-cpp.dylib libLLVM.dylib; do
                      if [ -f "$DEPS_LIB/$lib" ]; then
                        cp -a "$DEPS_LIB/$lib" "$STAGED_LIB/"
                        echo "Bundled $lib into SDK lib/"
                      else
                        echo "ERROR: $DEPS_LIB/$lib missing — AOT clang++ will fail on user machines."
                        exit 1
                      fi
                    done
                  else
                    # Linux: libclang-cpp.so.17 / libLLVM.so.17 (symlinks to versioned .so). Copy the
                    # symlink + the concrete file so loader resolution works without assuming ldconfig.
                    for stem in libclang-cpp libLLVM; do
                      matched=0
                      for f in "$DEPS_LIB/${stem}.so" "$DEPS_LIB/${stem}.so."*; do
                        [ -e "$f" ] || continue
                        cp -a "$f" "$STAGED_LIB/"
                        echo "Bundled $(basename "$f") into SDK lib/"
                        matched=1
                      done
                      if [ "$matched" = "0" ]; then
                        echo "ERROR: no ${stem}.so* found under $DEPS_LIB — AOT clang++ will fail."
                        exit 1
                      fi
                    done
                  fi

                  # macOS-only: libLLVM.dylib may hardcode a Homebrew-absolute path to libzstd.1.dylib
                  # (because the deps build picked up /opt/homebrew/opt/zstd during configure). Rewrite
                  # the install name to @rpath/libzstd.1.dylib and bundle libzstd alongside so the
                  # dynamic loader resolves it without requiring Homebrew on the target.
                  if [ "${{ runner.os }}" = "macOS" ]; then
                    BROKEN_ZSTD="$(otool -L "$STAGED_LIB/libLLVM.dylib" | awk '/libzstd/ {print $1}' | head -n1 || true)"
                    if [ -n "$BROKEN_ZSTD" ] && [ "$BROKEN_ZSTD" != "@rpath/libzstd.1.dylib" ]; then
                      echo "libLLVM.dylib references external zstd: $BROKEN_ZSTD"
                      if [ ! -e "$BROKEN_ZSTD" ]; then
                        echo "ERROR: $BROKEN_ZSTD does not exist on builder — cannot relocate."
                        exit 1
                      fi
                      # cp -L dereferences the symlink chain so we end up with a concrete dylib
                      # (Homebrew ships libzstd.1.dylib as a symlink to libzstd.1.5.x.dylib).
                      cp -L "$BROKEN_ZSTD" "$STAGED_LIB/libzstd.1.dylib"
                      chmod u+w "$STAGED_LIB/libzstd.1.dylib" "$STAGED_LIB/libLLVM.dylib"
                      install_name_tool -id "@rpath/libzstd.1.dylib" "$STAGED_LIB/libzstd.1.dylib"
                      install_name_tool -change "$BROKEN_ZSTD" "@rpath/libzstd.1.dylib" "$STAGED_LIB/libLLVM.dylib"
                      # Ad-hoc codesign so dyld on arm64 accepts the rewritten Mach-O (unsigned/invalid
                      # signatures are hard-rejected on Apple Silicon).
                      codesign --force --sign - "$STAGED_LIB/libzstd.1.dylib" "$STAGED_LIB/libLLVM.dylib"
                      echo "Relocated zstd reference -> @rpath/libzstd.1.dylib and bundled libzstd."
                    fi

                    echo "--- post-bundle verification (otool) ---"
                    otool -L "$STAGED_BIN/clang++" || true
                    otool -L "$STAGED_LIB/libLLVM.dylib" || true
                    # Reject any lingering absolute Homebrew / non-system paths in the bundled tree.
                    if otool -L "$STAGED_BIN/clang++" "$STAGED_LIB"/*.dylib 2>/dev/null \
                         | grep -E "^\s+(/opt/homebrew|/usr/local/(Cellar|opt))" ; then
                      echo "ERROR: bundled Unix AOT tools still reference Homebrew-absolute paths (see grep hits above)."
                      echo "These will not resolve on end-user machines without Homebrew."
                      exit 1
                    fi
                  fi

                  # Quick exec smoke test: make sure the bundled clang++ at least starts under
                  # the staged rpath (@loader_path/../lib on macOS, $ORIGIN/../lib on Linux).
                  "$STAGED_BIN/clang++" --version

            - name: Bundle LLVM linker tools (Windows)
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true' && runner.os == 'Windows'
              shell: pwsh
              run: |
                  $DepsBin  = "${{ github.workspace }}/.fw_dependencies/install/bin"
                  $StagedBin = "${{ env.INSTALL_PREFIX }}/bin"
                  $LldLink  = Join-Path $DepsBin "lld-link.exe"
                  if (Test-Path $LldLink) {
                    Copy-Item $LldLink -Destination $StagedBin -Force
                    Write-Host "Bundled lld-link.exe into SDK bin/"
                  } else {
                    Write-Host "ERROR: $LldLink not found — bundled LLVM must expose lld-link.exe for zero-dependency Windows AOT."
                    exit 1
                  }
                  # lld-link.exe may internally invoke lld.exe on some paths; ship it as insurance.
                  $Lld = Join-Path $DepsBin "lld.exe"
                  if (Test-Path $Lld) {
                    Copy-Item $Lld -Destination $StagedBin -Force
                    Write-Host "Bundled lld.exe into SDK bin/"
                  }

            - name: Save staged SDK cache
              if: steps.cache-staged-sdk.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: release-stage/${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}
                  key: ${{ runner.os }}-${{ runner.arch }}-staged-sdk-${{ github.event.release.tag_name || github.event.inputs.simulated_tag }}

            # --- Smoke-test the staged SDK before packaging ---
            # Verifies both AOT and JIT binaries run, find their modules, and resolve the bundled linker.
            # Catches packaging regressions (e.g. missing clang++, wrong lib path) before we ship installers.
            - name: Smoke-test staged SDK
              shell: bash
              run: |
                  set -e
                  BIN="${{ env.INSTALL_PREFIX }}/bin"
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    FW="$BIN/FlowWing.exe"
                    FW_JIT="$BIN/FlowWing-jit.exe"
                  else
                    FW="$BIN/FlowWing"
                    FW_JIT="$BIN/FlowWing-jit"
                  fi

                  echo "--- Staged SDK tree (bin/ only) ---"
                  ls -la "$BIN"

                  # Confirm the bundled linker is present — without it, AOT compilation fails on end-user
                  # machines even though the compiler binary runs. See src/common/io/PathUtils.hpp
                  # (getAOTLinkerPath) for the runtime resolution order.
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    LINKER_NAME="lld-link.exe"
                  else
                    LINKER_NAME="clang++"
                  fi
                  if [ ! -e "$BIN/$LINKER_NAME" ]; then
                    echo "ERROR: bundled linker $LINKER_NAME missing from $BIN — zero-dependency AOT will fail."
                    exit 1
                  fi
                  echo "Bundled linker found: $BIN/$LINKER_NAME"

                  # Unix: verify the bundled clang++ can actually exec with the staged rpath
                  # (@loader_path/../lib  /  $ORIGIN/../lib). If libLLVM / libclang-cpp / libzstd are
                  # missing or still point to a builder-absolute path, this exits non-zero here
                  # instead of failing on an end-user's machine.
                  if [ "${{ runner.os }}" != "Windows" ]; then
                    echo "--- Bundled clang++ exec probe ---"
                    "$BIN/clang++" --version
                    if [ "${{ runner.os }}" = "macOS" ]; then
                      echo "--- otool -L on bundled clang++ / dylibs ---"
                      otool -L "$BIN/clang++" || true
                      for f in "${{ env.INSTALL_PREFIX }}/lib"/*.dylib; do
                        [ -e "$f" ] || continue
                        otool -L "$f" | awk 'NR>1'
                      done
                      # Hard-fail if any Homebrew-absolute path leaked through.
                      if otool -L "$BIN/clang++" "${{ env.INSTALL_PREFIX }}/lib"/*.dylib 2>/dev/null \
                           | awk 'NR>1' \
                           | grep -E "^\s+(/opt/homebrew|/usr/local/(Cellar|opt))" ; then
                        echo "ERROR: staged Unix AOT still references Homebrew-absolute paths."
                        exit 1
                      fi
                    fi
                  fi

                  echo "--- FlowWing --version ---"
                  "$FW" --version

                  echo "--- FlowWing-jit --version ---"
                  "$FW_JIT" --version

                  # Module resolution: relies on <exe>/../lib/modules. Use a fixture that exercises
                  # `bring vec` + `bring Err` (the same one the user highlighted in their request).
                  SMOKE_FG="tests/fixtures/LatestTests/VecModuleTests/vec_mix_test.fg"

                  echo "--- JIT: run $SMOKE_FG ---"
                  "$FW_JIT" "$SMOKE_FG"

                  # The AOT compiler only produces an executable; it does not
                  # run it. Pipe it through a known `-o` path so we can exec
                  # the artefact and verify the full compile->link->run chain.
                  SMOKE_BUILD="$RUNNER_TEMP/flowwing-smoke"
                  rm -rf "$SMOKE_BUILD"
                  mkdir -p "$SMOKE_BUILD/bin"
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    AOT_OUT="$SMOKE_BUILD/bin/vec_mix_test.exe"
                  else
                    AOT_OUT="$SMOKE_BUILD/bin/vec_mix_test"
                  fi

                  echo "--- AOT: compile $SMOKE_FG -> $AOT_OUT ---"
                  "$FW" "$SMOKE_FG" --output-dir="$SMOKE_BUILD" -o "$AOT_OUT"

                  if [ ! -x "$AOT_OUT" ] && [ ! -e "$AOT_OUT" ]; then
                    echo "ERROR: AOT did not produce expected binary at $AOT_OUT"
                    ls -la "$SMOKE_BUILD/bin" || true
                    exit 1
                  fi

                  echo "--- AOT: run $AOT_OUT ---"
                  "$AOT_OUT"

            # --- Create archive ---
            # Use bash so Windows runners do not parse `cd` as PowerShell (paths with spaces need quoting there).
            # Windows images do not ship `zip` in Git Bash PATH; 7-Zip is installed via Chocolatey above.
            - name: Create archive
              shell: bash
              run: |
                  cd "${{ env.INSTALL_PREFIX }}"
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    7z a -tzip -r "../${{ matrix.archive_name }}" .
                  else
                    zip -r "../${{ matrix.archive_name }}" .
                  fi

            # --- Create native installer ---
            # On macOS, build-installer.sh produces BOTH the .dmg (drag-to-Applications) and
            # the .pkg (double-click, runs postinstall as root → /usr/local/bin symlinks on PATH).
            # PKG_INSTALLER_NAME is only consumed by the macOS branch of the script.
            - name: Create native installer
              shell: bash
              env:
                  PKG_INSTALLER_NAME: ${{ matrix.pkg_installer_name }}
              run: |
                  chmod +x .github/workflows/scripts/build-installer.sh
                  .github/workflows/scripts/build-installer.sh \
                    "${{ env.INSTALL_PREFIX }}" \
                    "${{ matrix.installer_name }}" \
                    "${{ runner.os }}" \
                    "${{ matrix.arch }}"

            # --- Upload to GitHub Release ---
            # `softprops/action-gh-release` replaces the deprecated actions/upload-release-asset@v1 which:
            #   (a) is unmaintained, (b) does not tolerate re-running the workflow (asset-already-exists errors),
            #   (c) requires passing an upload_url that only exists on `release` events.
            # `files:` accepts globs and missing entries are only fatal when `fail_on_unmatched_files: true`
            # is set. We list the pkg explicitly and guard it with a wildcard so non-macOS matrix legs
            # (where `pkg_installer_name` is empty) don't fail the upload.
            - name: Upload release assets (installer + SDK zip)
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      ${{ matrix.installer_name }}
                      ${{ matrix.pkg_installer_name }}
                      release-stage/${{ matrix.archive_name }}
                  fail_on_unmatched_files: false

            - name: Upload native installer (workflow artifact)
              uses: actions/upload-artifact@v4
              with:
                  name: native-installer-${{ matrix.name }}
                  path: ${{ matrix.installer_name }}
                  if-no-files-found: error

            # macOS only: upload the .pkg (auto-PATH GUI installer) as a separate workflow artifact
            # so it is downloadable from the build run even when the release upload is skipped
            # (workflow_dispatch mode).
            - name: Upload macOS .pkg (workflow artifact)
              if: runner.os == 'macOS' && matrix.pkg_installer_name != ''
              uses: actions/upload-artifact@v4
              with:
                  name: native-pkg-${{ matrix.name }}
                  path: ${{ matrix.pkg_installer_name }}
                  if-no-files-found: error

            - name: Upload SDK zip (workflow artifact)
              uses: actions/upload-artifact@v4
              with:
                  name: sdk-zip-${{ matrix.name }}
                  path: release-stage/${{ matrix.archive_name }}
                  if-no-files-found: error

    # ============================================================================
    # UPLOAD ARTIFACTS (waits for all builds)
    # ============================================================================
    upload:
        name: Upload all artifacts
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Verify build completed
              run: |
                  echo "Build matrix finished."
                  echo "Native installers and SDK zips: GitHub Release (if this was a release) + job Artifacts (native-installer-*, sdk-zip-*)."
                  echo "Tag: ${FLOWWING_VERSION}"

    # ============================================================================
    # PACKAGE MANAGER PUBLISHING (parallel, non-blocking)
    # ============================================================================
    publish-homebrew:
        name: Publish to Homebrew
        needs: upload
        # Only relevant for real releases (the tap formula points at the uploaded SDK zip URL).
        if: github.event_name == 'release'
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout repository (packaging script only)
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-tags: true
                  fetch-depth: 1
                  sparse-checkout: |
                      .github/workflows/scripts
                  sparse-checkout-cone-mode: true

            - name: Publish to Homebrew
              env:
                  TAG: ${{ github.event.release.tag_name }}
                  RELEASE_URL: ${{ github.event.release.html_url }}
                  # Git author + tap repo owner: same as the user that triggered the run (no extra secrets).
                  GIT_AUTHOR_NAME: ${{ github.actor }}
                  GIT_AUTHOR_EMAIL: ${{ format('{0}+{1}@users.noreply.github.com', github.actor_id, github.actor) }}
              run: |
                  chmod +x .github/workflows/scripts/package-homebrew.sh
                  .github/workflows/scripts/package-homebrew.sh \
                    "${TAG}" \
                    "${RELEASE_URL}" \
                    "${{ secrets.HOMEBREW_TAP_TOKEN }}"

    publish-chocolatey:
        name: Publish to Chocolatey
        needs: upload
        if: github.event_name == 'release'
        # choco is the Chocolatey CLI and is available on Windows images, not on ubuntu-latest.
        runs-on: windows-latest
        continue-on-error: true
        steps:
            - name: Enable Git long paths (Windows)
              shell: bash
              run: git config --global core.longpaths true

            - name: Checkout repository (packaging script only)
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-tags: true
                  fetch-depth: 1
                  sparse-checkout: |
                      .github/workflows/scripts
                  sparse-checkout-cone-mode: true

            - name: Install jq (JSON for release API)
              shell: pwsh
              run: choco install jq -y

            - name: Publish to Chocolatey
              shell: bash
              env:
                  TAG: ${{ github.event.release.tag_name }}
                  RELEASE_URL: ${{ github.event.release.html_url }}
              run: |
                  # Chocolatey shims + Git usrbin (sha256sum, etc.) for Git Bash
                  export PATH="/c/ProgramData/chocolatey/bin:/c/Program Files/Git/usr/bin:$PATH"
                  chmod +x .github/workflows/scripts/package-chocolatey.sh
                  .github/workflows/scripts/package-chocolatey.sh \
                    "${TAG}" \
                    "${RELEASE_URL}" \
                    "${{ secrets.CHOCOLATEY_API_KEY }}"

    publish-apt:
        name: Publish to apt
        needs: upload
        if: github.event_name == 'release'
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-tags: true
                  fetch-depth: 0

            - name: Publish to apt
              env:
                  TAG: ${{ github.event.release.tag_name }}
              run: |
                  chmod +x .github/workflows/scripts/package-apt.sh
                  .github/workflows/scripts/package-apt.sh \
                    "${TAG}" \
                    "${{ secrets.APT_REPO_TOKEN }}" \
                    "${{ secrets.APT_REPO_USERNAME }}"

    # ============================================================================
    # VERIFY INSTALL: install the native release artifact + run test fixtures
    # ============================================================================
    # Gated to `release` events: on workflow_dispatch there is no published release to
    # download from, so this job cannot succeed. The staged-SDK smoke test inside the
    # `build` job covers the dispatch path already.
    #
    # Rationale for installing the native artifacts directly instead of going through
    # Homebrew / Chocolatey / apt feeds:
    #   * Chocolatey community moderation is asynchronous (hours → days). `choco install
    #     flowwing` in the same CI run routinely fails with "package not found".
    #   * The Homebrew tap PR created by publish-homebrew is not auto-merged, so
    #     `brew install kushagra1212/flowwing/flowwing` may install an older / missing
    #     formula until a human merges it.
    # The .pkg / NSIS .exe / .deb we upload to the GitHub Release IS exactly what end
    # users download, so verifying them is both more reliable and a stronger signal.
    # The per-package-manager install paths are still covered by `brew test` /
    # `choco install --local` / similar that can be wired into `publish-*` jobs.
    verify-install:
        name: Verify install (${{ matrix.os-name }})
        needs: [publish-homebrew, publish-chocolatey, publish-apt]
        if: github.event_name == 'release'
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os-name: macos-arm64
                      runner: macos-14
                      asset_name: FlowWing-${{ github.event.release.tag_name }}-macos-arm64.pkg
                    - os-name: windows-x86_64
                      runner: windows-latest
                      asset_name: FlowWing-${{ github.event.release.tag_name }}-windows-x86_64.exe
                    - os-name: linux-x86_64
                      runner: ubuntu-latest
                      asset_name: FlowWing-${{ github.event.release.tag_name }}-linux-x86_64.deb

        runs-on: ${{ matrix.runner }}
        steps:
            - name: Download release artifact
              shell: bash
              env:
                  ASSET_NAME: ${{ matrix.asset_name }}
              run: |
                  set -euo pipefail
                  URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${ASSET_NAME}"
                  DEST="${RUNNER_TEMP}/${ASSET_NAME}"
                  echo "Downloading: $URL"
                  # -f makes 404 / 5xx fail loudly instead of writing the error page
                  # body to disk (which would then silently misinstall later).
                  # --retry covers the short window between softprops/action-gh-release
                  # finishing and the GitHub CDN exposing the asset.
                  curl -fsSL --retry 5 --retry-delay 4 -o "$DEST" "$URL"
                  ls -la "$DEST"

            - name: Install FlowWing (macOS .pkg)
              if: runner.os == 'macOS'
              shell: bash
              env:
                  ASSET_NAME: ${{ matrix.asset_name }}
              run: |
                  set -euo pipefail
                  # `installer -pkg` bypasses Gatekeeper entirely — we never open the
                  # .pkg via Finder / `open`, so the quarantine xattr is irrelevant.
                  # Postinstall (build-installer.sh) creates /usr/local/bin/{flowwing,
                  # flowwing-jit} symlinks that Terminal's default PATH already sees.
                  sudo installer -pkg "${RUNNER_TEMP}/${ASSET_NAME}" -target /
                  ls -l /usr/local/bin/flowwing /usr/local/bin/flowwing-jit

            - name: Install FlowWing (Windows NSIS .exe)
              if: runner.os == 'Windows'
              shell: pwsh
              env:
                  ASSET_NAME: ${{ matrix.asset_name }}
              run: |
                  $Installer = Join-Path $env:RUNNER_TEMP $env:ASSET_NAME
                  Write-Host "Running silent NSIS install: $Installer /S"
                  # /S = NSIS silent mode. Start-Process -Wait + non-zero exit would
                  # be invisible without an explicit check, so inspect $LASTEXITCODE.
                  $p = Start-Process -FilePath $Installer -ArgumentList '/S' -Wait -NoNewWindow -PassThru
                  if ($p.ExitCode -ne 0) {
                    Write-Host "NSIS installer exited with $($p.ExitCode)"
                    exit $p.ExitCode
                  }
                  $InstallDir = "C:\Program Files\FlowWing\${env:GITHUB_REF_NAME}\bin"
                  Write-Host "Expecting binaries under: $InstallDir"
                  Get-ChildItem $InstallDir

            - name: Install FlowWing (Linux .deb)
              if: runner.os == 'Linux'
              shell: bash
              env:
                  ASSET_NAME: ${{ matrix.asset_name }}
              run: |
                  set -euo pipefail
                  # Intentionally NO `|| apt-get install -f -y` fallback here: the .deb
                  # has no external dependencies (SDK is self-contained), so any dpkg
                  # failure is a real packaging bug we want surfaced, not masked.
                  sudo dpkg -i "${RUNNER_TEMP}/${ASSET_NAME}"
                  ls -l /usr/local/bin/FlowWing /usr/local/bin/FlowWing-jit

            # --- Locate both AOT (FlowWing) and JIT (FlowWing-jit) binaries ---
            # With direct-artifact installs the locations are deterministic per platform,
            # so no fallback search is needed (the previous `find /usr/local/flow-wing`
            # fallback tripped `set -e` + `pipefail` when the dir didn't exist, killing
            # the script silently on any upstream regression).
            - name: Locate FlowWing binaries (AOT + JIT)
              id: verify_bin
              shell: bash
              run: |
                  set -euo pipefail

                  if [ "${{ runner.os }}" = "Windows" ]; then
                      # NSIS InstallDir = "C:\Program Files\FlowWing\<tag>\bin" (see
                      # build-installer.sh). The installer adds that dir to the system
                      # PATH, but the edit does not propagate to this shell session —
                      # resolve the binary by absolute path instead.
                      FW_PATH="/c/Program Files/FlowWing/${GITHUB_REF_NAME}/bin/FlowWing.exe"
                      FW_JIT_PATH="/c/Program Files/FlowWing/${GITHUB_REF_NAME}/bin/FlowWing-jit.exe"
                  else
                      # Both Linux post-install.sh and macOS .pkg postinstall place
                      # /usr/local/bin/{flowwing,flowwing-jit} symlinks that point at
                      # the versioned install dir.
                      FW_PATH="/usr/local/bin/FlowWing"
                      FW_JIT_PATH="/usr/local/bin/FlowWing-jit"
                  fi

                  FW_FOUND=false
                  FW_JIT_FOUND=false
                  [ -x "$FW_PATH" ]     && FW_FOUND=true
                  [ -x "$FW_JIT_PATH" ] && FW_JIT_FOUND=true

                  {
                      echo "FW_FOUND=$FW_FOUND"
                      echo "FW_PATH=$FW_PATH"
                      echo "FW_JIT_FOUND=$FW_JIT_FOUND"
                      echo "FW_JIT_PATH=$FW_JIT_PATH"
                  } >> "$GITHUB_OUTPUT"

                  echo "FlowWing (AOT):     found=$FW_FOUND  path=$FW_PATH"
                  echo "FlowWing-jit (JIT): found=$FW_JIT_FOUND  path=$FW_JIT_PATH"

            - name: Fail early if AOT binary is missing
              if: steps.verify_bin.outputs.FW_FOUND != 'true'
              shell: bash
              run: |
                  echo "::error::FlowWing binary was not found at the expected install location."
                  echo "Likely causes:"
                  echo "  * Linux: .deb postinst (post-install.sh) did not create /usr/local/bin/flowwing."
                  echo "  * macOS: .pkg postinstall did not create /usr/local/bin/flowwing symlinks."
                  echo "  * Windows: NSIS InstallDir changed without updating verify-install's path."
                  exit 1

            - name: Check FlowWing versions (AOT + JIT)
              shell: bash
              run: |
                  set -e
                  echo "--- FlowWing (AOT) --version ---"
                  "${{ steps.verify_bin.outputs.FW_PATH }}" --version
                  if [ "${{ steps.verify_bin.outputs.FW_JIT_FOUND }}" = "true" ]; then
                      echo "--- FlowWing-jit (JIT) --version ---"
                      "${{ steps.verify_bin.outputs.FW_JIT_PATH }}" --version
                  else
                      echo "::warning::FlowWing-jit is not on PATH (JIT smoke tests will be skipped)."
                  fi

            - name: Download test fixtures from GitHub
              shell: bash
              run: |
                  set -e
                  mkdir -p /tmp/flowwing-verify/{01_basics,VecModuleTests,BringTestBasicTestAll,18_mingled_module_bring,ModuleTests}

                  fetch() {
                      local rel="$1"
                      local dst="/tmp/flowwing-verify/$2"
                      curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${GITHUB_REF_NAME}/tests/fixtures/LatestTests/${rel}" -o "$dst"
                  }

                  # hello-world.fg — no deps, baseline AOT smoke test.
                  fetch "01_basics/hello-world.fg"                                    "01_basics/hello-world.fg"

                  # vec_mix_test.fg — exercises `bring Err` + `bring vec` (both bundled modules).
                  # This is the fixture the user highlighted as "must work after install".
                  fetch "VecModuleTests/vec_mix_test.fg"                              "VecModuleTests/vec_mix_test.fg"
                  fetch "VecModuleTests/vec_e2e_test.fg"                              "VecModuleTests/vec_e2e_test.fg"

                  # Relative import: `bring "file1.fg"` — tests user-file module resolution.
                  fetch "BringTests/BringTestBasicTestAll/task2.fg"                   "BringTestBasicTestAll/task2.fg"
                  fetch "BringTests/BringTestBasicTestAll/file1.fg"                   "BringTestBasicTestAll/file1.fg"

                  # Mingled class + module bring — stresses the binder + linker together.
                  fetch "ClassTests/18_mingled_module_bring/bring_module_class_field_while.fg" "18_mingled_module_bring/bring_module_class_field_while.fg"
                  fetch "ClassTests/18_mingled_module_bring/support_cnt_module.fg"             "18_mingled_module_bring/support_cnt_module.fg"

                  # Pure module fixtures — AOT linker must pull in the brought TU's object.
                  fetch "ModuleTests/03_edge_cases/module_for_counter.fg"             "ModuleTests/module_for_counter.fg"

                  echo "Test fixtures downloaded:"
                  find /tmp/flowwing-verify -type f | sort

            - name: Run AOT test fixtures
              id: run_aot_tests
              shell: bash
              env:
                  FW_BIN: ${{ steps.verify_bin.outputs.FW_PATH }}
              run: |
                  set +e
                  FAILURES=0
                  TOTAL=0

                  AOT_OUT_DIR="${RUNNER_TEMP}/flowwing-aot-out"
                  mkdir -p "$AOT_OUT_DIR"

                  run_case() {
                      local label="$1"
                      local path="$2"

                      # Extract the filename without the .fg extension
                      local basename=$(basename -- "$path")
                      local stem="${basename%.*}"
                      local out_bin="$AOT_OUT_DIR/$stem"
                      
                      # Append .exe if we are running on Windows
                      if [ "${{ runner.os }}" = "Windows" ]; then
                          out_bin="${out_bin}.exe"
                      fi


                      TOTAL=$((TOTAL + 1))
                      echo "-> Compiling to $out_bin..."
                      if "$FW_BIN" "$path" --output-dir="$AOT_OUT_DIR" -o "$out_bin"; then
                          
                          # Step 2: Execute the compiled binary
                          echo "-> Executing binary..."
                          if "$out_bin"; then
                              echo "[PASS] $label"
                          else
                              echo "[FAIL] $label (Execution failed with exit code $?)"
                              FAILURES=$((FAILURES + 1))
                          fi
                          
                      else
                          echo "[FAIL] $label (Compilation failed with exit code $?)"
                          FAILURES=$((FAILURES + 1))
                      fi
                  }

                  run_case "hello-world.fg"                            /tmp/flowwing-verify/01_basics/hello-world.fg
                  run_case "vec_mix_test.fg (bring Err + bring vec)"   /tmp/flowwing-verify/VecModuleTests/vec_mix_test.fg
                  run_case "vec_e2e_test.fg (bring vec)"               /tmp/flowwing-verify/VecModuleTests/vec_e2e_test.fg
                  run_case "task2.fg (relative bring)"                 /tmp/flowwing-verify/BringTestBasicTestAll/task2.fg
                  run_case "bring_module_class_field_while.fg"         /tmp/flowwing-verify/18_mingled_module_bring/bring_module_class_field_while.fg

                  echo ""
                  echo "=== AOT Summary: $((TOTAL - FAILURES))/$TOTAL passed ==="
                  if [ "$FAILURES" -gt 0 ]; then
                      echo "[RESULT] AOT verify FAILED"
                      exit 1
                  fi

            - name: Run JIT test fixtures
              if: steps.verify_bin.outputs.FW_JIT_FOUND == 'true'
              id: run_jit_tests
              shell: bash
              env:
                  FW_BIN: ${{ steps.verify_bin.outputs.FW_JIT_PATH }}
              run: |
                  set +e
                  FAILURES=0
                  TOTAL=0

                  run_case() {
                      local label="$1"
                      local path="$2"
                      TOTAL=$((TOTAL + 1))
                      echo ""
                      echo "=== [JIT] $label ==="
                      if "$FW_BIN" "$path"; then
                          echo "[PASS] $label"
                      else
                          echo "[FAIL] $label (exit=$?)"
                          FAILURES=$((FAILURES + 1))
                      fi
                  }

                  run_case "hello-world.fg"                            /tmp/flowwing-verify/01_basics/hello-world.fg
                  run_case "vec_mix_test.fg (bring Err + bring vec)"   /tmp/flowwing-verify/VecModuleTests/vec_mix_test.fg
                  run_case "vec_e2e_test.fg"                           /tmp/flowwing-verify/VecModuleTests/vec_e2e_test.fg
                  run_case "task2.fg (relative bring)"                 /tmp/flowwing-verify/BringTestBasicTestAll/task2.fg

                  echo ""
                  echo "=== JIT Summary: $((TOTAL - FAILURES))/$TOTAL passed ==="
                  if [ "$FAILURES" -gt 0 ]; then
                      echo "[RESULT] JIT verify FAILED"
                      exit 1
                  fi
